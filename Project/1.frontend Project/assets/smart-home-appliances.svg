<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Smart home appliances kitchen banner</title>
  <desc id="desc">A modern kitchen counter with a glossy air fryer, vegetables, plates, and warm cabinet lighting.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8f0ed"/>
      <stop offset="0.48" stop-color="#cddbd8"/>
      <stop offset="1" stop-color="#f5efe4"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" x2="1">
      <stop offset="0" stop-color="#e9e4d7"/>
      <stop offset="0.45" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#d7c9b5"/>
    </linearGradient>
    <linearGradient id="fryerBody" x1="0" x2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.38" stop-color="#d9e2e6"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b5c0c7"/>
    </linearGradient>
    <linearGradient id="blackGlass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#262628"/>
      <stop offset="0.45" stop-color="#050506"/>
      <stop offset="1" stop-color="#2a221b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#d18920"/>
      <stop offset="0.5" stop-color="#f5c35d"/>
      <stop offset="1" stop-color="#a76014"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2a2119" flood-opacity="0.28"/>
    </filter>
    <filter id="blurBack">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#wall)"/>
  <rect y="338" width="1200" height="182" fill="url(#counter)"/>
