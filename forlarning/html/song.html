<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #bf83ea, #b889d9);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 300px;
            background: rgba(160, 122, 122, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 10px;
            padding: 5px;
        }
        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            padding: 5px;
        }
        .menu {
            margin: 20px 0;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
        }
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .notification {
            background: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .controls i {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search...">
        </div>
        <div class="menu">
            <div class="menu-item"><i class="fas fa-th"></i> Dashboard</div>
            <div class="menu-item notification">
                <span><i class="fas fa-bell"></i> Notification</span>
                <span class="badge">1</span>
            </div>
            <div class="menu-item"><i class="fas fa-heart"></i> My favorites</div>
            <div class="menu-item"><i class="fas fa-folder"></i> Playlist</div>
            <div class="menu-item"><i class="fas fa-cog"></i> Settings</div>
        </div>
        <div class="player">
            <div class="song-title">Belki</div>
            <div class="artist"> Dedubluman </div>
            <input type="range" class="progress-bar" value="0" min="0" max="100" id="progressBar">
            <div class="controls">
                <i class="fas fa-backward" onclick="rewind()"></i>
                <i class="fas fa-play" id="playPause" onclick="togglePlayPause()"></i>
                <i class="fas fa-forward" onclick="forward()"></i>
            </div>
            
            <audio id="audioPlayer" >
                <source src="song.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>
    
    <script>
        const audio = document.getElementById("audioPlayer");
        const playPauseBtn = document.getElementById("playPause");
        const progressBar = document.getElementById("progressBar");
        
        function togglePlayPause() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.classList.remove("fa-play");
                playPauseBtn.classList.add("fa-pause");
            } else {
                audio.pause();
                playPauseBtn.classList.remove("fa-pause");
                playPauseBtn.classList.add("fa-play");
            }
        }
        
        function rewind() {
            audio.currentTime -= 5;
        }
        
        function forward() {
            audio.currentTime += 5;
        }
        
        audio.addEventListener("timeupdate", () => {
            progressBar.value = (audio.currentTime / audio.duration) * 100;
        });
    </script>
</body>
</html
