<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Library</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #faf7f2;
      --surface:  #ffffff;
      --card:     #ffffff;
      --border:   #e8e0d5;
      --border2:  #d5cab8;
      --amber:    #e07c2a;
      --amber-dk: #b85f15;
      --amber-lt: #fff3e6;
      --teal:     #0d7a6b;
      --teal-lt:  #e4f5f2;
      --red:      #dc3545;
      --red-lt:   #fff0f0;
      --text:     #1a1208;
      --sub:      #8a7a68;
      --sub2:     #b5a898;
      --shadow:   rgba(80,50,10,0.10);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1rem 5rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(224,124,42,0.06), transparent),
        radial-gradient(ellipse 50% 30% at 0% 100%, rgba(13,122,107,0.05), transparent);
    }

    /* ── TOPBAR ── */
    .topbar {
      max-width: 820px;
      margin: 0 auto 2.8rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 1.4rem;
      border-bottom: 2px solid var(--border);
    }
    .topbar-left .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
      background: var(--amber-lt);
      border: 1px solid rgba(224,124,42,0.25);
      border-radius: 4px;
      padding: 0.22rem 0.65rem;
      margin-bottom: 0.5rem;
      display: inline-block;
    }
    .topbar-left h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .topbar-left h1 em { color: var(--amber); font-style: italic; }
    .topbar-left .subtitle {
      margin-top: 0.35rem;
      font-size: 0.8rem;
      color: var(--sub);
    }
    .task-chip {
      background: var(--amber);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem;
      font-weight: 500;
      padding: 0.38rem 0.85rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      margin-top: 0.3rem;
    }

    /* ── FORM CARD ── */
    .form-card {
      max-width: 820px;
      margin: 0 auto 1.8rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem 2rem;
      box-shadow: 0 4px 24px var(--shadow);
    }
    .form-card h2 {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 1.2rem;
    }
    .form-row {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
    }
    .field {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .field input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(224,124,42,0.12);
      background: #fff;
    }
    .field input::placeholder { color: var(--sub2); }

    .btn-save {
      align-self: flex-end;
      padding: 0.8rem 1.8rem;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(224,124,42,0.28);
    }
    .btn-save:hover {
      background: var(--amber-dk);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(224,124,42,0.38);
    }
    .btn-save:active { transform: scale(0.97); }

    /* ── STATS BAR ── */
    .stats-bar {
      max-width: 820px;
      margin: 0 auto 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stats-bar .info {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sub);
    }
    .stats-bar .info span { color: var(--amber); font-weight: 500; }
    .storage-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--teal);
      background: var(--teal-lt);
      border: 1px solid rgba(13,122,107,0.2);
      border-radius: 20px;
      padding: 0.22rem 0.75rem;
    }
    .storage-pill::before { content: '●'; font-size: 0.45rem; }

    /* ── TABLE CARD ── */
    .table-card {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px var(--shadow);
    }
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #f5efe6;
      border-bottom: 2px solid var(--border2);
    }
    thead th {
      padding: 0.9rem 1.2rem;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sub);
      white-space: nowrap;
    }
    thead th:last-child { text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: rowSlide 0.28s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes rowSlide {
      from { opacity:0; transform: translateX(-14px); }
      to   { opacity:1; transform: translateX(0); }
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fdf8f2; }

    tbody td {
      padding: 1rem 1.2rem;
      font-size: 0.9rem;
      color: var(--text);
      vertical-align: middle;
    }

    /* # column */
    td.col-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--sub2);
      width: 48px;
    }

    /* Title column */
    td.col-title {
      font-weight: 600;
      font-size: 0.94rem;
    }
    .book-cover {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
    }
    .cover-thumb {
      width: 32px; height: 40px;
      border-radius: 3px;
      background: linear-gradient(135deg, var(--amber), var(--amber-dk));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
    }

    /* Author column */
    td.col-author { color: var(--sub); font-size: 0.85rem; }

    /* Added date column */
    td.col-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--sub2);
    }

    /* Action column */
    td.col-action { text-align: center; }
    .del-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--sub);
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.32rem 0.85rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.02em;
    }
    .del-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-lt);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    .empty-state .shelf {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      opacity: 0.35;
    }
    .empty-state p {
      color: var(--sub);
      font-size: 0.88rem;
    }
    .empty-state strong { color: var(--amber); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #fff;
      border: 1.5px solid var(--red);
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.75rem 1.4rem;
      border-radius: 10px;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
   
    <h1>Book <em>Library</em></h1>
    <p class="subtitle">book collection</p>
  </div>
  <div class="task-chip">INCREASE YOUR KNOWLEDGE</div>
</div>

<!-- FORM CARD -->
<div class="form-card">
  <h2>Add a New Book</h2>
  <div class="form-row">
    <div class="field">
      <label>Book Title</label>
      <input type="text" id="bookTitle" placeholder="e.g. The Alchemist"/>
    </div>
    <div class="field">
      <label>Author Name</label>
      <input type="text" id="bookAuthor" placeholder="e.g. Paulo Coelho"/>
    </div>
    <button class="btn-save" onclick="addBook()">Save Book →</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="info"><span id="bookCount">0</span> book(s) in collection</div>
  <div class="storage-pill">localStorage — persists on refresh</div>
</div>

<!-- TABLE CARD -->
<div class="table-card">
  <div class="table-wrap">
    <table id="bookTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Book Title</th>
          <th>Author</th>
          <th>Date Added</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookTbody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <div class="shelf">📚</div>
      <p>Your library is empty.<br/>Add your first book using the form <strong>above</strong>.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'batch13_books_v2';

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '⚠  ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function loadBooks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveBooks(books) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  // emoji covers by index
  const covers = ['📕','📗','📘','📙','📒','📓'];

  function render() {
    const books  = loadBooks();
    const tbody  = document.getElementById('bookTbody');
    const empty  = document.getElementById('emptyState');
    const countEl = document.getElementById('bookCount');

    countEl.textContent = books.length;
    tbody.innerHTML = '';

    if (books.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    books.forEach((book, i) => {
      // ── document.createElement('tr') as required
      const tr = document.createElement('tr');

      const tdNum    = document.createElement('td');
      const tdTitle  = document.createElement('td');
      const tdAuthor = document.createElement('td');
      const tdDate   = document.createElement('td');
      const tdAction = document.createElement('td');

      tdNum.className    = 'col-num';
      tdTitle.className  = 'col-title';
      tdAuthor.className = 'col-author';
      tdDate.className   = 'col-date';
      tdAction.className = 'col-action';

      tdNum.textContent = String(i + 1).padStart(2, '0');

      tdTitle.innerHTML = `<div class="book-cover">
        <div class="cover-thumb">${covers[i % covers.length]}</div>
        <span>${escHtml(book.title)}</span>
      </div>`;

      tdAuthor.textContent = book.author;
      tdDate.textContent   = formatDate(book.date);

      // ── Delete button with addEventListener (Event Listener)
      const delBtn = document.createElement('button');
      delBtn.className   = 'del-btn';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', function() {
        deleteBook(i);
      });

      tdAction.appendChild(delBtn);
      tr.appendChild(tdNum);
      tr.appendChild(tdTitle);
      tr.appendChild(tdAuthor);
      tr.appendChild(tdDate);
      tr.appendChild(tdAction);
      tbody.appendChild(tr);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addBook() {
    const titleEl  = document.getElementById('bookTitle');
    const authorEl = document.getElementById('bookAuthor');
    const title    = titleEl.value.trim();
    const author   = authorEl.value.trim();

    // Validation
    if (!title && !author) {
      showToast('Book title and author name are both required!');
      titleEl.focus(); return;
    }
    if (!title) {
      showToast('Please enter the book title!');
      titleEl.focus(); return;
    }
    if (!author) {
      showToast('Please enter the author name!');
      authorEl.focus(); return;
    }

    const books = loadBooks();
    books.push({ title, author, date: new Date().toISOString() });
    saveBooks(books);

    titleEl.value  = '';
    authorEl.value = '';
    titleEl.focus();
    render();
  }

  function deleteBook(index) {
    const books = loadBooks();
    books.splice(index, 1);
    saveBooks(books);
    render();
  }

  // Enter key navigation
  document.getElementById('bookTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('bookAuthor').focus();
  });
  document.getElementById('bookAuthor').addEventListener('keydown', e => {
    if (e.key === 'Enter') addBook();
  });

  // Init
  render();
</script>
</body>
</html>
