<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen appliance product image</title>
  <desc id="desc">A colorful ecommerce product illustration with cookware, blender, and smart appliance shapes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="0.45" stop-color="#eef8fb"/>
      <stop offset="1" stop-color="#f8eef7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1">
      <stop offset="0" stop-color="#d9eef4"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9dc8d5"/>
    </linearGradient>
    <linearGradient id="pan" x1="0" x2="1">
      <stop offset="0" stop-color="#343a46"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#1f2937" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="520" height="360" rx="18" fill="url(#bg)"/>
  <circle cx="438" cy="71" r="54" fill="#f7c948" opacity=".28"/>
  <circle cx="79" cy="285" r="70" fill="#11a7a2" opacity=".16"/>
  <path d="M35 292 C133 260 196 310 279 280 C377 244 427 266 493 238" fill="none" stroke="#ffffff" stroke-width="22" opacity=".65"/>

  <g filter="url(#shadow)">
    <rect x="74" y="177" width="162" height="70" rx="35" fill="url(#pan)"/>
    <ellipse cx="155" cy="176" rx="83" ry="31" fill="#596273"/>
    <ellipse cx="155" cy="176" rx="65" ry="21" fill="#111827"/>
    <rect x="221" y="160" width="128" height="18" rx="9" fill="#c58b4c" transform="rotate(-18 221 160)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="278" y="137" width="118" height="118" rx="24" fill="#f7fafc"/>
    <rect x="303" y="70" width="68" height="92" rx="16" fill="url(#glass)" stroke="#9dc8d5" stroke-width="5"/>
    <rect x="316" y="48" width="42" height="18" rx="9" fill="#94a3b8"/>
    <rect x="291" y="221" width="92" height="34" rx="16" fill="#f2b91d"/>
    <circle cx="337" cy="192" r="16" fill="#7356bd"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="358" y="145" width="92" height="96" rx="14" fill="#0f172a"/>
    <rect x="372" y="159" width="64" height="44" rx="6" fill="#38bdf8"/>
    <rect x="385" y="220" width="38" height="8" rx="4" fill="#94a3b8"/>
    <rect x="375" y="232" width="58" height="8" rx="4" fill="#475569"/>
  </g>

  <g>
    <circle cx="126" cy="125" r="33" fill="#ef5c76"/>
    <circle cx="169" cy="112" r="27" fill="#f2b91d"/>
    <circle cx="203" cy="132" r="24" fill="#3aa85f"/>
    <path d="M105 117 C132 91 177 91 218 128" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".7"/>
  </g>
