<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Mint cookware set</title>
  <desc id="desc">A mint and cream nonstick cookware set with pans, pots, lids, and wooden utensils.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e7fbf6"/>
      <stop offset="1" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" x2="1">
      <stop offset="0" stop-color="#87d7cc"/>
      <stop offset="0.55" stop-color="#d8fbf4"/>
      <stop offset="1" stop-color="#5bbdb2"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" x2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="1" stop-color="#e4d3b4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#1f2937" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="520" height="360" rx="18" fill="url(#bg)"/>
  <circle cx="86" cy="78" r="50" fill="#ffffff" opacity=".65"/>
  <circle cx="440" cy="290" r="66" fill="#f2b91d" opacity=".16"/>
  <g filter="url(#shadow)">
    <rect x="83" y="215" width="146" height="52" rx="26" fill="url(#mint)"/>
    <ellipse cx="156" cy="215" rx="76" ry="28" fill="#f8fff9"/>
