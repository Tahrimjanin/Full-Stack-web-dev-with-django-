    <rect x="214" y="195" width="128" height="15" rx="8" fill="#d99b59" transform="rotate(-22 214 195)"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="259" y="154" width="128" height="88" rx="24" fill="url(#mint)"/>
    <ellipse cx="323" cy="154" rx="68" ry="25" fill="#f8fff9"/>
    <ellipse cx="323" cy="151" rx="44" ry="14" fill="#b3efe6"/>
    <path d="M262 186 C229 182 229 217 263 212" fill="none" stroke="#73c9bd" stroke-width="13" stroke-linecap="round"/>
    <path d="M386 186 C421 182 421 217 386 212" fill="none" stroke="#73c9bd" stroke-width="13" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="151" y="128" width="106" height="75" rx="22" fill="url(#cream)"/>
