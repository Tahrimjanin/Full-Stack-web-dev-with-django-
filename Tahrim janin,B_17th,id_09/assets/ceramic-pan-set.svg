<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Ceramic cooking pan set</title>
  <desc id="desc">A warm ceramic pan and saucepan set with pink, cream, and brass details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0f4"/>
      <stop offset="1" stop-color="#fff8e8"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1">
      <stop offset="0" stop-color="#eaa5b5"/>
      <stop offset="0.5" stop-color="#fff1eb"/>
      <stop offset="1" stop-color="#d98798"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0" stop-color="#edeff2"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b8c0c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#1f2937" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="520" height="360" rx="18" fill="url(#bg)"/>
  <circle cx="427" cy="83" r="60" fill="#f2b91d" opacity=".18"/>
  <circle cx="94" cy="272" r="74" fill="#ef5c76" opacity=".13"/>
  <g filter="url(#shadow)">
    <rect x="80" y="203" width="156" height="54" rx="27" fill="url(#pink)"/>
    <ellipse cx="158" cy="201" rx="82" ry="30" fill="#fff9f4"/>
    <ellipse cx="158" cy="201" rx="60" ry="19" fill="#d89aa6"/>
    <rect x="222" y="184" width="132" height="16" rx="8" fill="#c99057" transform="rotate(-19 222 184)"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="259" y="146" width="128" height="93" rx="24" fill="url(#steel)"/>
    <ellipse cx="323" cy="146" rx="68" ry="25" fill="#fff9f4"/>
    <ellipse cx="323" cy="143" rx="45" ry="14" fill="#e6b0bb"/>
    <path d="M259 178 C226 174 226 213 260 209" fill="none" stroke="#d4939e" stroke-width="13" stroke-linecap="round"/>
    <path d="M387 178 C421 174 421 213 387 209" fill="none" stroke="#d4939e" stroke-width="13" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="160" y="116" width="112" height="78" rx="24" fill="#f5e7da"/>
    <ellipse cx="216" cy="116" rx="59" ry="23" fill="#ffffff"/>
    <path d="M181 107 C197 78 234 78 251 107" fill="none" stroke="#c99763" stroke-width="9" stroke-linecap="round"/>
    <circle cx="216" cy="88" r="10" fill="#c99763"/>
  </g>
  <path d="M352 112 L429 60" stroke="#b87538" stroke-width="14" stroke-linecap="round"/>
  <path d="M378 146 L464 103" stroke="#d59c5a" stroke-width="14" stroke-linecap="round"/>
