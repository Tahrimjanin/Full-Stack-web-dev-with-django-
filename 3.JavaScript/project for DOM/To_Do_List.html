<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Tahrim janin" />
    <meta name="description" content="We love JavaScript" />
    <title>DOM - Document Object Model</title>
    <style>
      * {
        box-sizing: border-box;
      }

      .container {
        background: #d3efdf;
        padding: 25px;
        max-width: 760px;
        margin: 25px auto;
        overflow: hidden;
        border-radius: 10px;
        border: 4px solid #b1c9bb;
        font-family: sans-serif;
      }

      h1, h2 {
        margin: 0;
        text-align: center;
        text-transform: uppercase;
      }

      h2 {
        font-size: 20px;
        text-align: center;
        border-bottom: 1px solid #b1c9bb;
        padding: 0 0 10px;
        color: #57635c;
      }

      .logo {
        width: 100%;
        text-align: center;
      }

      .logo img {
        width: 100px;
      }

      .new-task-container {
        text-align: center;
      }

      .box {
        padding: 10px 15px;
        border: 2px solid #b1c9bb;
        border-radius: 5px;
        background: #fff;
        margin: 15px 0;
      }

      .todo-list {
        float: left;
        width: 46%;
      }

      .complete-list {
        float: right;
        width: 46%;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        padding: 10px;
        border-bottom: 1px dotted #ccc;
      }

      .delete {
        float: right;
        background-color: red;
        color: white;
        border: 0px;
        padding: 3px 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <section class="container">
      <div class="logo">
        <!-- logo image removed for standalone use -->
      </div>
      <h1 id="header" class="header">To-Do App</h1>

      <form class="new-task-container box">
        <label for="new-task">Add New Task</label>
        <input type="text" id="new-task" />
        <input type="submit" id="addTask" value="Add Task" />
      </form>

      <div class="todo-list box">
        <h2>Incomplete Tasks</h2>
        <ul id="items">
          <li class="item">
            <input type="checkbox" id="task-1" />
            <label for="task-1">Task Name 1</label>
          </li>
          <li class="item">
            <input type="checkbox" id="task-2" />
            <label for="task-2">Task Name 2</label>
          </li>
          <li class="item">
            <input type="checkbox" id="task-3" />
            <label for="task-3">Task Name 3</label>
          </li>
        </ul>
      </div>

      <div class="complete-list box">
        <h2>Completed Tasks</h2>
        <ul id="completed-items">
          <!-- completed tasks will appear here -->
        </ul>
      </div>
    </section>

    <script>
      // select elements & assign them to variables
      let newTask = document.querySelector('#new-task');
      let form = document.querySelector('form');
      let todoUl = document.querySelector('#items');
      let completeUl = document.querySelector('#completed-items'); // ✅ Fixed: use id selector

      // functions
      let createTask = function(task) {
        let listItem = document.createElement('li');
        let checkBox = document.createElement('input');
        let label = document.createElement('label');

        label.innerText = task;
        checkBox.type = 'checkbox'; // ✅ Fixed: no extra spaces

        listItem.appendChild(checkBox);
        listItem.appendChild(label);

        return listItem;
      }

      let addTask = function(event) {
        event.preventDefault();
        if (newTask.value.trim() === '') return; // ✅ Added: prevent empty tasks
        let listItem = createTask(newTask.value);
        todoUl.appendChild(listItem);
        newTask.value = "";
        bindInCompleteItems(listItem, completeTask);
      }

      let completeTask = function() {
        let listItem = this.parentNode;
        let deleteBtn = document.createElement('button');
        deleteBtn.innerText = 'Delete';
        deleteBtn.className = 'delete';
        listItem.appendChild(deleteBtn);

        let checkBox = listItem.querySelector('input[type="checkbox"]');
        checkBox.remove();
        completeUl.appendChild(listItem);
        bindCompleteItems(listItem, deleteTask);
      }

      let deleteTask = function() {
        let listItem = this.parentNode;
        let ul = listItem.parentNode;
        ul.removeChild(listItem);
      }

      let bindInCompleteItems = function(taskItem, checkboxClick) {
        let checkBox = taskItem.querySelector('input[type="checkbox"]');
        checkBox.onchange = checkboxClick;
      }

      let bindCompleteItems = function(taskItem, deleteButtonClick) {
        let deleteButton = taskItem.querySelector('.delete');
        deleteButton.onclick = deleteButtonClick;
      }

      // bind existing incomplete items
      for (let i = 0; i < todoUl.children.length; i++) {
        bindInCompleteItems(todoUl.children[i], completeTask);
      }

      // bind existing complete items
      for (let i = 0; i < completeUl.children.length; i++) {
        bindCompleteItems(completeUl.children[i], deleteTask);
      }

      form.addEventListener('submit', addTask);
    </script>
  </body>
</html>
